name: Deploy static content to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy_retry.outcome == 'success' && steps.deploy_retry.outputs.page_url || steps.deploy_primary.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages (first attempt)
        id: deploy_primary
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Deploy to GitHub Pages (retry)
        id: deploy_retry
        if: ${{ steps.deploy_primary.outcome == 'failure' }}
        uses: actions/deploy-pages@v5
      - name: Fail when both deploy attempts fail
        if: ${{ steps.deploy_primary.outcome == 'failure' && steps.deploy_retry.outcome == 'failure' }}
        run: exit 1
